<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 120" width="80" height="120">
  <!-- Battery cap -->
  <rect x="24" y="1" width="32" height="10" rx="3" ry="3" fill="#4a4a4a" stroke="#333" stroke-width="2"/>

  <!-- Battery body outline -->
  <rect x="10" y="10" width="60" height="100" rx="6" ry="6" fill="none" stroke="#333" stroke-width="4"/>

  <!-- Battery body inner background (slight dark tint) -->
  <rect x="14" y="14" width="52" height="92" rx="3" ry="3" fill="rgba(0,0,0,0.08)"/>

  <!-- Charge bars (bottom to top) -->
  <!-- Bar 1 (bottom) -->
  <rect x="18" y="84" width="44" height="16" rx="2" ry="2" fill="#4CAF50"/>
  <!-- Bar 2 -->
  <rect x="18" y="64" width="44" height="16" rx="2" ry="2" fill="#4CAF50"/>
  <!-- Bar 3 -->
  <rect x="18" y="44" width="44" height="16" rx="2" ry="2" fill="#4CAF50"/>
  <!-- Bar 4 (top) -->
  <rect x="18" y="24" width="44" height="16" rx="2" ry="2" fill="#4CAF50"/>
</svg>
